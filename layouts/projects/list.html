{{ define "main" }}
<div>

  <header class="not-prose border-b border-neutral-200 py-12 dark:border-neutral-800">
    <h1 class="text-4xl font-extrabold tracking-tight text-neutral-900 dark:text-neutral-100">
      {{ .Title }}
    </h1>
    {{ with .Description }}
    <p class="mt-3 max-w-2xl text-lg text-neutral-500 dark:text-neutral-400">{{ . }}</p>
    {{ end }}
  </header>

  {{ with .Content }}
  <div class="prose dark:prose-invert max-w-prose py-10">
    {{ . }}
  </div>
  {{ end }}

  {{ if .Sections }}
  <div class="not-prose max-w-2xl space-y-10 py-12 {{ if .Content }}border-t border-neutral-200 dark:border-neutral-800{{ end }}">
    {{ range .Sections }}
    <div>
      <h2 class="text-xl font-bold text-neutral-900 dark:text-neutral-100">
        <a href="{{ .RelPermalink }}" class="hover:text-primary-600 dark:hover:text-primary-400">{{ .Title }}</a>
      </h2>
      {{ with .Description }}
      <p class="mt-2 text-neutral-500 dark:text-neutral-400">{{ . }}</p>
      {{ end }}
      <a href="{{ .RelPermalink }}"
         class="mt-3 inline-block text-sm font-medium text-primary-600 hover:underline dark:text-primary-400">
        View &#8594;
      </a>
    </div>
    {{ end }}
  </div>
  {{ end }}

</div>
{{ end }}

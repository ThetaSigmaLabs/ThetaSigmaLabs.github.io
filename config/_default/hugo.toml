baseURL = "https://thetasigma.org/"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[module]
  [[module.imports]]
    path = "github.com/nunocoracao/blowfish/v2"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^ASTROBIN_API_KEY$', '^ASTROBIN_API_SECRET$']
